<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="color-scheme" content="light dark">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Linker</title>
  <link rel="stylesheet" href="popup.css">
  <script defer src="popup.js"></script>
</head>
<body>
  <header class="header">
    <div class="brand">
      <svg class="brand-mark" aria-hidden="true" viewBox="1 0 118 118" fill="currentColor">
        <path d="M58 86.215h4a4 4 0 1 1 0 8h-4a4 4 0 1 1 0-8ZM37 73.927a6 6 0 1 0 0-12 6 6 0 0 0 0 12Zm46 0a6 6 0 1 1 0-12 6 6 0 0 1 0 12Z" />

rule="evenodd" />
      </svg>
      <div>
        <h1>Linker</h1>
        <p>Your shortcuts, one hop away</p>
      </div>
    </div>

    <div class="header-actions" role="toolbar" aria-label="Linker actions">
      <button id="btn-help" class="icon-button" type="button" title="Open help" aria-label="Open help">?</button>
      <button id="btn-import" class="icon-button" type="button" title="Import JSON" aria-label="Import shortcuts">↑</button>
      <input id="import-file" class="visually-hidden" type="file" accept=".json,application/json">
      <button id="btn-export" class="icon-button" type="button" title="Export JSON" aria-label="Export shortcuts">↓</button>
    </div>
  </header>

  <main>
    <label class="search-field" for="search">
      <span aria-hidden="true">⌕</span>
      <input id="search" type="search" autocomplete="off" placeholder="Search shortcuts">
    </label>

    <p
      id="capacity-warning"
      class="capacity-warning"
      role="status"
      aria-live="polite"
      aria-atomic="true"
      hidden
    ></p>

    <section class="shortcuts" aria-label="Saved shortcuts">
      <ul id="item-list" class="shortcut-list"></ul>
      <p id="empty-state" class="empty-state" hidden></p>
    </section>

    <details id="add-section" class="add-section">
      <summary>
        <span class="summary-icon" aria-hidden="true">+</span>
        Add new shortcut
      </summary>

      <div class="add-form">
        <div class="field-label">
          <label for="full-link">Destination URL</label>
          <span id="variable-badge" class="variable-badge" hidden>Variable</span>
        </div>
        <input
          id="full-link"
          type="url"
          placeholder="https://example.com/items/{*}"
          spellcheck="false"
          aria-describedby="destination-hint"
        >
        <p id="destination-hint" class="field-hint">
          Add <code>{*}</code> where the trailing go link value should appear.
        </p>

        <div id="fallback-field" class="conditional-field" hidden>
          <label for="fallback-link">Default go link to</label>
          <input
            id="fallback-link"
            type="url"
            placeholder="https://example.com/"
            spellcheck="false"
            aria-describedby="fallback-hint"
          >
          <p id="fallback-hint" class="field-hint">Used when no variable value is provided.</p>
        </div>

        <label for="go-link">Shortcut</label>
        <div class="shortcut-field">
          <span>go/</span>
          <input
            id="go-link"
            type="text"
            maxlength="100"
            autocomplete="off"
            placeholder="shortcut"
            aria-describedby="shortcut-hint"
          >
        </div>
        <p id="shortcut-hint" class="field-hint">No spaces or URL punctuation.</p>

        <button id="save" class="primary-button" type="button">Save shortcut</button>
      </div>
    </details>
  </main>

  <div id="toast" class="toast hidden" role="status" aria-live="polite">
    <span id="toast-message"></span>
    <button id="toast-close" class="toast-close" type="button" aria-label="Dismiss notification">×</button>
  </div>

  <div id="confirm-modal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
    <div class="modal">
      <p id="confirm-title"></p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="secondary-button" type="button">Cancel</button>
        <button id="confirm-ok" class="danger-button" type="button">Delete</button>
      </div>
    </div>
  </div>

  <template id="shortcut-template">
    <li class="shortcut-item">
      <button class="shortcut-open" type="button">
        <span class="shortcut-icon" aria-hidden="true"></span>
        <span class="shortcut-copy">
          <span class="shortcut-heading">
            <strong class="shortcut-name"></strong>
            <span
              class="variable-badge"
              title="Parameterized shortcut"
              aria-label="Parameterized shortcut"
              hidden
            >VAR</span>
          </span>
          <span class="shortcut-url"></span>
        </span>
        <span class="open-indicator" aria-hidden="true">↗</span>
      </button>
      <button class="shortcut-delete" type="button" title="Delete shortcut" aria-label="Delete shortcut">×</button>
    </li>
  </template>
</body>
</html>
