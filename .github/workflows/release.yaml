name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Test
        run: node --test

      - name: Set version
        id: version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(jq -r .version manifest.json)
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create browser ZIPs
        run: |
          zip -r "Linker_${{ steps.version.outputs.VERSION }}.chromium.zip" . -x "*.git*" ".github/*" "README.md" "tests/*"
          cp "Linker_${{ steps.version.outputs.VERSION }}.chromium.zip" "Linker_${{ steps.version.outputs.VERSION }}.firefox.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Linker-extensions
          path: |
            Linker_${{ steps.version.outputs.VERSION }}.chromium.zip
            Linker_${{ steps.version.outputs.VERSION }}.firefox.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Linker_${{ steps.version.outputs.VERSION }}.chromium.zip
            Linker_${{ steps.version.outputs.VERSION }}.firefox.zip
          generate_release_notes: true